<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Cairo Chaos: Traffic Survival - Navigate through chaotic Cairo traffic in this browser game">
    <meta name="keywords" content="game, cairo, traffic, survival, html5, canvas, mobile">
    <meta name="author" content="Your Name">
    <meta name="theme-color" content="#f39c12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Cairo Chaos: Traffic Survival</title>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Cairo Chaos</h1>
        <p class="subtitle">Traffic Survival</p>
    </header>

    <main id="gameContainer">
        <canvas id="gameCanvas" width="450" height="600" aria-label="Cairo Chaos game canvas"></canvas>
        
        <!-- HUD Layer -->
        <div class="ui-layer">
            <div id="scoreBox" class="hud-item">Score: 0</div>
            <div id="hornBox" class="hud-item">Horn: READY</div>
        </div>

        <!-- Mobile Controls -->
        <div id="mobileControls" class="mobile-controls">
            <button class="mobile-btn left-btn" id="leftBtn" aria-label="Move Left">
                <span>◀</span>
            </button>
            <button class="mobile-btn horn-btn" id="hornBtn" aria-label="Honk Horn">
                <span>📢</span>
            </button>
            <button class="mobile-btn right-btn" id="rightBtn" aria-label="Move Right">
                <span>▶</span>
            </button>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" role="dialog" aria-labelledby="gameOverTitle">
            <h2 id="gameOverTitle">YALAHWI! Crash!</h2>
            <p id="finalScore">You survived 0 meters.</p>
            <p class="crash-reason" id="crashReason"></p>
            <button onclick="resetGame()" class="retry-btn" aria-label="Try again">
                Try Again
            </button>
        </div>
    </main>

    <footer class="controls-hint">
        <div class="desktop-controls">
            <strong>Desktop:</strong> 
            <kbd>←</kbd> <kbd>→</kbd> or <kbd>A</kbd>/<kbd>D</kbd> to weave. 
            <kbd>SPACE</kbd> to Honk
        </div>
        <div class="mobile-controls-hint">
            <strong>Mobile:</strong> Use buttons below game to control
        </div>
    </footer>

    <script src="js/game.js"></script>
</body>
</html>
