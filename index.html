<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cairo Chaos: Traffic Survival</title>
    <style>
        body {
            margin: 0;
            background: #222;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin: 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #f39c12;
            text-shadow: 2px 2px #000;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        canvas {
            background: #3a3a3a;
            display: block;
            border: 4px solid #f39c12;
            border-radius: 4px;
        }
        .ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 18px;
            pointer-events: none;
            text-shadow: 1px 1px 2px #000;
        }
        #gameOverScreen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        #gameOverScreen h2 {
            color: #e74c3c;
            font-size: 40px;
            margin-bottom: 10px;
        }
        button {
            background: #f39c12;
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 15px;
            transition: 0.2s;
        }
        button:hover {
            background: #e67e22;
        }
        .controls-hint {
            margin-top: 10px;
            color: #aaa;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Cairo Chaos</h1>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="450" height="600"></canvas>
        
        <div class="ui-layer">
            <div id="scoreBox">Score: 0</div>
            <div id="hornBox">Horn: READY (Space)</div>
        </div>

        <div id="gameOverScreen">
            <h2>YALAHWI! Crash!</h2>
            <p id="finalScore">You survived 0 meters.</p>
            <p style="color: #bbb; font-style: italic;" id="crashReason"></p>
            <button onclick="resetGame()">Try Again</button>
        </div>
    </div>

    <div class="controls-hint">
        <strong>Controls:</strong> Left/Right Arrows (or A/D) to weave. <strong>SPACEBAR</strong> to Honk (pushes cars away!).
    </div>

    <script>
        // Wait for everything to load
        window.addEventListener('load', function() {
            
            const canvas = document.getElementById("gameCanvas");
            const ctx = canvas.getContext("2d");
            const gameOverScreen = document.getElementById("gameOverScreen");
            const scoreBox = document.getElementById("scoreBox");
            const hornBox = document.getElementById("hornBox");
            const finalScore = document.getElementById("finalScore");
            const crashReason = document.getElementById("crashReason");

            // Game state
            let gameActive = true;
            let score = 0;
            let roadY = 0;
            const speed = 7;
            let animationId = null;
            let spawnTimer = null;

            // Player
            const player = {
                x: 200,
                y: 480,
                width: 40,
                height: 70,
                color: "#3498db",
                hornActive: false,
                hornRadius: 0,
                hornCooldown: 0
            };

            // Enemy types
            const enemyTypes = [
                { type: 'microbus', color: '#f1c40f', width: 45, height: 85, baseSpeed: 3, label: 'Microbus' },
                { type: 'scooter', color: '#e74c3c', width: 20, height: 40, baseSpeed: 10, label: 'Tok-Tok/Scooter' },
                { type: 'oldSedan', color: '#95a5a6', width: 40, height: 70, baseSpeed: 4, label: 'Ancient VTI' }
            ];

            let enemies = [];
            const keys = {};

            // Keyboard controls
            window.addEventListener("keydown", function(e) {
                keys[e.code] = true;
                if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Space'].includes(e.code)) {
                    e.preventDefault();
                }
            });

            window.addEventListener("keyup", function(e) {
                keys[e.code] = false;
            });

            // Spawn enemies
            function spawnEnemy() {
                if (!gameActive) return;

                const type = enemyTypes[Math.floor(Math.random() * enemyTypes.length)];
                const x = Math.random() * (canvas.width - type.width - 40) + 20;

                enemies.push({
                    x: x,
                    y: -100,
                    width: type.width,
                    height: type.height,
                    color: type.color,
                    speed: type.baseSpeed,
                    type: type.type,
                    label: type.label,
                    behaviorTimer: Math.random() * 100 + 50,
                    isStopping: false
                });

                if (gameActive) {
                    spawnTimer = setTimeout(spawnEnemy, Math.random() * 1200 + 600);
                }
            }

            // Game update
            function update() {
                if (!gameActive) return;

                // Road movement
                roadY += speed;
                if (roadY >= 60) roadY = 0;

                // Player movement
                if (keys["ArrowLeft"] || keys["KeyA"]) player.x -= 6;
                if (keys["ArrowRight"] || keys["KeyD"]) player.x += 6;
                
                if (player.x < 15) player.x = 15;
                if (player.x > canvas.width - player.width - 15) player.x = canvas.width - player.width - 15;

                // Horn
                if (keys["Space"] && player.hornCooldown <= 0) {
                    player.hornActive = true;
                    player.hornRadius = 10;
                    player.hornCooldown = 150;
                }

                if (player.hornActive) {
                    player.hornRadius += 8;
                    if (player.hornRadius > 140) {
                        player.hornActive = false;
                    }
                }
                if (player.hornCooldown > 0) player.hornCooldown--;

                // Update UI
                score++;
                scoreBox.innerText = `Score: ${score}`;
                hornBox.innerText = player.hornCooldown <= 0 ? "Horn: READY (Space)" : "Horn: Reloading...";
                hornBox.style.color = player.hornCooldown <= 0 ? "#2ecc71" : "#e74c3c";

                // Update enemies
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const enemy = enemies[i];

                    // AI behavior
                    enemy.behaviorTimer--;
                    if (enemy.behaviorTimer <= 0) {
                        enemy.behaviorTimer = Math.random() * 150 + 50;
                        
                        if (enemy.type === 'microbus') {
                            enemy.isStopping = !enemy.isStopping;
                        } else if (enemy.type === 'scooter') {
                            enemy.speed = Math.random() * 5 + 8;
                            enemy.x += (Math.random() > 0.5 ? 40 : -40);
                        }
                    }

                    // Movement
                    let currentSpeed = enemy.isStopping ? -speed : (enemy.speed - speed);
                    enemy.y -= currentSpeed;

                    // Horn effect
                    if (player.hornActive) {
                        let dx = (enemy.x + enemy.width/2) - (player.x + player.width/2);
                        let dy = (enemy.y + enemy.height/2) - (player.y + player.height/2);
                        let distance = Math.sqrt(dx*dx + dy*dy);
                        
                        if (distance < player.hornRadius) {
                            enemy.x += dx > 0 ? 5 : -5;
                        }
                    }

                    // Remove if off screen
                    if (enemy.y > canvas.height + 100 || enemy.y < -200) {
                        enemies.splice(i, 1);
                        continue;
                    }

                    // Collision check
                    if (player.x < enemy.x + enemy.width &&
                        player.x + player.width > enemy.x &&
                        player.y < enemy.y + enemy.height &&
                        player.y + player.height > enemy.y) {
                        endGame(enemy);
                        return;
                    }
                }

                draw();
                animationId = requestAnimationFrame(update);
            }

            // Draw everything
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Road
                ctx.fillStyle = "#3a3a3a";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Shoulders
                ctx.fillStyle = "#cca673";
                ctx.fillRect(0, 0, 15, canvas.height);
                ctx.fillRect(canvas.width - 15, 0, 15, canvas.height);

                // Lane markers
                ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
                for (let i = roadY - 60; i < canvas.height; i += 60) {
                    ctx.fillRect(145, i, 4, 30);
                    ctx.fillRect(295, i, 4, 30);
                }

                // Horn effect
                if (player.hornActive) {
                    ctx.strokeStyle = "rgba(243, 156, 18, 0.5)";
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(player.x + player.width/2, player.y + player.height/2, player.hornRadius, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // Enemies
                enemies.forEach(enemy => {
                    ctx.fillStyle = enemy.color;
                    ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);

                    if (enemy.isStopping && enemy.type === 'microbus') {
                        ctx.fillStyle = "#ff3300";
                        ctx.fillRect(enemy.x, enemy.y + enemy.height - 5, 10, 8);
                        ctx.fillRect(enemy.x + enemy.width - 10, enemy.y + enemy.height - 5, 10, 8);
                    }
                });

                // Player
                ctx.fillStyle = player.color;
                ctx.fillRect(player.x, player.y, player.width, player.height);
                ctx.fillStyle = "#ffffaa";
                ctx.fillRect(player.x + 4, player.y - 4, 8, 5);
                ctx.fillRect(player.x + player.width - 12, player.y - 4, 8, 5);
            }

            // End game
            function endGame(hitEnemy) {
                gameActive = false;
                
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                if (spawnTimer) {
                    clearTimeout(spawnTimer);
                    spawnTimer = null;
                }

                gameOverScreen.style.display = "flex";
                finalScore.innerText = `You managed to survive ${score} meters.`;
                
                const reasons = {
                    'microbus': "A Microbus stopped short instantly in front of you to pull over!",
                    'scooter': "A delivery scooter cut across your lane lane-splitting dynamically.",
                    'oldSedan': "An old bumperless sedan braked out of nowhere without brake lights."
                };
                crashReason.innerText = reasons[hitEnemy.type] || "You crashed!";
            }

            // Reset game
            window.resetGame = function() {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                if (spawnTimer) {
                    clearTimeout(spawnTimer);
                    spawnTimer = null;
                }

                enemies = [];
                score = 0;
                player.x = 200;
                player.hornCooldown = 0;
                player.hornActive = false;
                player.hornRadius = 0;
                gameOverScreen.style.display = "none";
                
                scoreBox.innerText = "Score: 0";
                hornBox.innerText = "Horn: READY (Space)";
                hornBox.style.color = "#2ecc71";
                
                gameActive = true;
                spawnEnemy();
                update();
            };

            // Start game
            console.log("Starting Cairo Chaos...");
            spawnEnemy();
            update();
        });
    </script>
</body>
</html>
